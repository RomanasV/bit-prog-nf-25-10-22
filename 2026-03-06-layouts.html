<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layouts</title>
    <link rel="stylesheet" href="layouts.css" />
  </head>
  <body>
    <div>
      <h1>Grid</h1>

      <div class="container-grid container-grid-7-1">
        <div class="inner-container-1">
          <div class="child-1 red"></div>
          <div class="child-2 purple"></div>
          <div class="child-3 green"></div>
          <div class="child-4 yellow"></div>
        </div>

        <div class="inner-container-2">
          <div class="child-1 orange"></div>
          <div class="child-2 purple"></div>
          <div class="child-3 green"></div>
        </div>

        <div class="inner-container-3">
          <div class="child-1 red"></div>
          <div class="child-2 purple"></div>
          <div class="child-3 blue"></div>
          <div class="child-4 yellow"></div>
        </div>
      </div>

      <div class="container-grid container-grid-7">
        <div class="item-1 orange"></div>
        <div class="item-2 red"></div>
        <div class="item-3 purple"></div>
        <div class="item-4 blue"></div>
        <div class="item-5 green"></div>
        <div class="item-6 yellow"></div>
        <div class="item-7 red"></div>
        <div class="item-8 purple"></div>
        <div class="item-9 blue"></div>
        <div class="item-10 red"></div>
        <div class="item-11 orange"></div>
      </div>

      <div class="container-grid container-grid-2-1">
        <div class="inner-container">
          <div class="green"></div>
          <div class="blue"></div>
        </div>
        <div class="inner-container">
          <div class="orange"></div>
          <div class="yellow"></div>
        </div>
        <div class="inner-container">
          <div class="red"></div>
          <div class="purple"></div>
        </div>
      </div>

      <div class="container-grid container-grid-2">
        <div class="item-1 orange"></div>
        <div class="item-2 red"></div>
        <div class="item-3 purple"></div>
        <div class="item-4 blue"></div>
        <div class="item-5 green"></div>
        <div class="item-6 yellow"></div>
      </div>

      <div class="container-grid container-grid-1">
        <div class="item-1 orange"></div>
        <div class="item-2 red"></div>
        <div class="item-3 purple"></div>
        <div class="item-4 blue"></div>
        <div class="item-5 green"></div>
        <div class="item-6 yellow"></div>
      </div>
    </div>

    <div>
      <h1>Flexbox</h1>

      <div class="container-flex container-flex-2-2">
        <div class="inner-container-1">
          <div class="item-1 orange"></div>
          <div class="item-2 red"></div>
        </div>

        <div class="inner-container-2">
          <div class="item-1 purple"></div>
          <div class="item-2 blue"></div>
        </div>

        <div class="inner-container-3">
          <div class="item-1 green"></div>
          <div class="item-2 yellow"></div>
        </div>
      </div>

      <div class="container-flex container-flex-2">
        <div class="item-1 green"></div>
        <div class="item-2 blue"></div>
        <div class="item-3 red"></div>
        <div class="item-4 yellow"></div>
        <div class="item-5 purple"></div>
        <div class="item-6 orange"></div>
      </div>

      <div class="container-flex container-flex-7">
        <div class="inner-container">
          <div class="child-1 orange"></div>
          <div class="child-2 blue"></div>
          <div class="child-3 purple"></div>
          <div class="child-4 yellow"></div>
        </div>
        <div class="inner-container">
          <div class="child-1 blue"></div>
          <div class="child-2 green"></div>
          <div class="child-3 purple"></div>
        </div>
        <div class="inner-container">
          <div class="child-1 green"></div>
          <div class="child-2 red"></div>
          <div class="child-3 orange"></div>
          <div class="child-4 yellow"></div>
        </div>
      </div>
    </div>
  </body>
</html>
